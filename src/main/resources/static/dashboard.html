<!DOCTYPE html>
<html>

<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #eef2f3, #dfe9f3);
}

/* NAVBAR */
.navbar{
    background:#2c3e50;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    height:100vh;
    background:#34495e;
    position:fixed;
    padding-top:20px;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
    transition:0.3s;
}

.sidebar a:hover{
    background:#1abc9c;
}

/* MAIN */
.main{
    margin-left:220px;
    padding:20px;
}

/* CARDS */
.cards{
    display:flex;
    gap:20px;
    margin-bottom:30px;
}

.card{
    flex:1;
    padding:25px;
    border-radius:15px;
    color:white;
    text-align:center;
    font-size:18px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform: translateY(-5px);
}

.card1{ background:#3498db; }
.card2{ background:#2ecc71; }
.card3{ background:#e74c3c; }

/* PROGRESS */
.progress-container{
    width:60%;
    margin:20px auto;
}

.progress-bar-bg{
    background:#ccc;
    border-radius:20px;
    height:25px;
}

.progress-bar{
    height:25px;
    background:#27ae60;
    border-radius:20px;
    width:0%;
    text-align:center;
    color:white;
}

/* CHART */
.chart-box{
    width:350px;
    height:350px;
    margin:auto;
}

/* LOGOUT */
.logout{
    position:absolute;
    top:15px;
    right:20px;
    padding:8px 15px;
    background:red;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="navbar">
    Admin Dashboard
    <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="sidebar">
    <a href="students.html">Students</a>
    <a href="scan.html">Scan Attendance</a>
    <a href="report.html">Report</a>
    <a href="http://localhost:8080/attendance/export">Download Excel</a>
</div>

<div class="main">

<h2 style="text-align:center;">Dashboard Overview</h2>
<h4 id="dateTime" style="text-align:center;"></h4>

<div class="cards">
    <div class="card card1">
        <h3>Total Students</h3>
        <p id="totalStudents">0</p>
    </div>

    <div class="card card2">
        <h3>Present</h3>
        <p id="present">0</p>
    </div>

    <div class="card card3">
        <h3>Absent</h3>
        <p id="absent">0</p>
    </div>
</div>

<!-- PROGRESS -->
<div class="progress-container">
    <p>Attendance Progress</p>
    <div class="progress-bar-bg">
        <div id="progressBar" class="progress-bar">0%</div>
    </div>
</div>

<!-- CHART -->
<div class="chart-box">
    <canvas id="attendanceChart"></canvas>
</div>

</div>

<script>

// ✅ Load Data (FIXED)
window.onload = function(){

fetch("http://localhost:8080/attendance/stats")
.then(res => res.json())
.then(data => {

    // ✅ ALL values from ONE API
    document.getElementById("totalStudents").innerText = data.total;
    document.getElementById("present").innerText = data.present;
    document.getElementById("absent").innerText = data.absent;

    let total = data.total;

    let percent = total > 0 ? (data.present / total) * 100 : 0;

    let bar = document.getElementById("progressBar");
    bar.style.width = percent + "%";
    bar.innerText = Math.round(percent) + "%";

    // Chart
    new Chart(document.getElementById("attendanceChart"), {
        type: 'doughnut',
        data: {
            labels: ["Present", "Absent"],
            datasets: [{
                data: [data.present, data.absent]
            }]
        }
    });

});

};

// Live Time
setInterval(()=>{
document.getElementById("dateTime").innerHTML =
new Date().toLocaleString();
},1000);

// Logout
function logout(){
window.location.href="login.html";
}

</script>

</body>
</html>
