<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f6f9;
background: linear-gradient(to right, #eef2f3, #dfe9f3);
}

.sidebar{
width:220px;
height:100vh;
background:#2c3e50;
position:fixed;
padding-top:20px;
}

.sidebar a{
display:block;
color:white;
padding:15px;
text-decoration:none;
}

.sidebar a:hover{
background:#34495e;
}

.main{
margin-left:220px;
padding:20px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
flex:1;
text-align:center;
transition: 0.3s;
border-radius: 10px;
}
.card:hover {
    transform: scale(1.05);
    box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
}

</style>

</head>

<body>
	

	<button onclick="logout()" style="position:absolute; top:10px; right:10px;">
	Logout
	</button>

<div class="sidebar">

<h2 style="color:white;text-align:center;">Admin</h2>

<a href="students.html">Students</a>

<a href="scan.html">Scan Attendance</a>

<a href="report.html">Attendance Report</a>

<a href="http://localhost:8080/attendance/export">Download Excel</a>

</div>

<div class="main">

<h2>Dashboard</h2>
<h4 id="dateTime" style="text-align:center;"></h4>

<div class="cards">

<div class="card">
<h3>Total Students</h3>
<p id="totalStudents">0</p>
</div>

<div class="card">
<h3>Present Today</h3>
<p id="present">0</p>
</div>

<div class="card">
<h3>Absent Today</h3>
<p id="absent">0</p>
</div>

<div style="width:50%; margin:auto;">
    <p>Attendance Progress</p>
    <div style="background:#ccc; height:20px; border-radius:10px;">
        <div id="progressBar" style="height:20px; background:green; width:0%; border-radius:10px;"></div>
    </div>
</div>

<div style="width:300px; height:300px; margin:auto;">
    <canvas id="attendanceChart"></canvas>
</div>

<script>

window.onload = function(){

// ✅ Students Count
fetch("http://localhost:8080/students")
.then(res => res.json())
.then(data => {
document.getElementById("totalStudents").innerText = data.length;
});

// ✅ Attendance Stats
fetch("http://localhost:8080/attendance/stats")
.then(res => res.json())
.then(data => {

document.getElementById("present").innerText = data.present;
document.getElementById("absent").innerText = data.absent;

// ✅ Progress Bar
let percent = (data.present / (data.present + data.absent)) * 100;
document.getElementById("progressBar").style.width = percent + "%";

// ✅ Chart
new Chart(document.getElementById("attendanceChart"), {
type: 'pie',
data: {
labels: ["Present", "Absent"],
datasets: [{
data: [data.present, data.absent]
}]
},
options: {
responsive: true,
maintainAspectRatio: false
}
});

});

};

// ✅ Live Date Time
setInterval(() => {
let now = new Date();
document.getElementById("dateTime").innerHTML = now.toLocaleString();
}, 1000);

// ✅ Logout
function logout(){
window.location.href = "login.html";
}

</script>
</body>

</html>
